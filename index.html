<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>大亂鬥戰績紀錄</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>⚔️ 大亂鬥戰績紀錄</h1>
    <p>記錄每一場對戰的榮耀與恥辱</p>
    <nav>
      <a href="index.html" class="active">排行榜</a>
      <a href="sessions.html">場次紀錄</a>
      <a href="admin.html">新增紀錄</a>
    </nav>
  </header>

  <main>
    <section class="stats" id="summary">
      <div class="stat-card"><span class="stat-number">-</span><span class="stat-label">總場次</span></div>
      <div class="stat-card"><span class="stat-number">3</span><span class="stat-label">玩家人數</span></div>
      <div class="stat-card"><span class="stat-number">-</span><span class="stat-label">當前霸主</span></div>
    </section>

    <section class="leaderboard">
      <h2>戰績總覽</h2>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>玩家</th>
              <th>角色賽</th>
              <th>團體賽</th>
              <th>單挑賽</th>
              <th>問號賽</th>
              <th>劍士賽</th>
              <th>總計</th>
            </tr>
          </thead>
          <tbody id="stats-body"><tr><td colspan="7" style="text-align:center;color:#555;padding:30px">載入中...</td></tr></tbody>
        </table>
      </div>
    </section>
  </main>

  <footer>
    <p>Made with ❤️ and 無數次被打飛</p>
  </footer>

  <script src="data.js"></script>
  <script>
    const GITHUB_API = 'https://api.github.com/repos/javaku9527/javaku9527.github.io/contents/data.json';

    function fromBase64(b64) {
      const binary = atob(b64.replace(/\s/g, ''));
      const bytes = Uint8Array.from(binary, c => c.charCodeAt(0));
      return new TextDecoder().decode(bytes);
    }

    async function readData() {
      const res = await fetch(GITHUB_API);
      if (!res.ok) throw new Error(`載入失敗 (${res.status})`);
      const file = await res.json();
      return JSON.parse(fromBase64(file.content));
    }

    function computeStats(sessions) {
      const stats = {};
      PLAYERS.forEach(p => {
        stats[p] = { character: 0, team: 0, solo: 0, random: 0, sword: 0, total: 0 };
      });
      sessions.forEach(s => {
        Object.entries(s.results).forEach(([type, winner]) => {
          if (winner && stats[winner]) {
            stats[winner][type]++;
            stats[winner].total++;
          }
        });
      });
      return stats;
    }

    function findChampion(stats) {
      let max = 0, champ = '-';
      PLAYERS.forEach(p => {
        if (stats[p].total > max) { max = stats[p].total; champ = p; }
      });
      return champ;
    }

    readData().then(data => {
      const sessions = data.sessions || [];
      const stats = computeStats(sessions);
      const champ = findChampion(stats);

      document.getElementById('summary').innerHTML = `
        <div class="stat-card"><span class="stat-number">${sessions.length}</span><span class="stat-label">總場次</span></div>
        <div class="stat-card"><span class="stat-number">${PLAYERS.length}</span><span class="stat-label">玩家人數</span></div>
        <div class="stat-card"><span class="stat-number">${champ}</span><span class="stat-label">當前霸主</span></div>
      `;

      const sorted = [...PLAYERS].sort((a, b) => stats[b].total - stats[a].total);
      document.getElementById('stats-body').innerHTML = sorted.map((player, i) => {
        const s = stats[player];
        const isTop = i === 0 && s.total > 0;
        return `
          <tr class="${isTop ? 'top' : ''}">
            <td class="player-cell">${isTop ? '👑 ' : ''}${player}</td>
            <td>${s.character}</td>
            <td>${s.team}</td>
            <td>${s.solo}</td>
            <td>${s.random}</td>
            <td>${s.sword}</td>
            <td class="total">${s.total}</td>
          </tr>
        `;
      }).join('');
    }).catch(err => {
      document.getElementById('stats-body').innerHTML =
        `<tr><td colspan="7" style="text-align:center;color:#ff4d4d;padding:30px">${err.message}</td></tr>`;
    });
  </script>
</body>
</html>
